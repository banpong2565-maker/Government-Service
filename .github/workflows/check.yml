name: Check OCSC job announcements
on:
  schedule:
    # ทุกชั่วโมง (เวลา UTC) — ปรับได้ตามต้องการ
    - cron: "0 * * * *"
  workflow_dispatch: {}   # กดรันมือได้จากแท็บ Actions
permissions:
  contents: write   # ให้ workflow commit ไฟล์ seen.json กลับเข้า repo ได้
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium
      - name: Run notify script
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: python -u notify.py
      - name: Commit updated seen.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.json
          git diff --staged --quiet || git commit -m "update seen.json [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed, retrying..."
            sleep $((RANDOM % 5 + 1))
          done
